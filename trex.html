<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>T-Rex MindAR with Info Board</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body,
    a-scene {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }
  </style>
</head>

<body>

  <a-scene
    mindar-image="imageTargetSrc: targets (2).mind;
    autoStart: true;
    uiScanning: no;
    uiLoading: no;
    uiError: no;
    "
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets>
      <a-asset-item id="T-RexModel" src="T-Rex.glb"></a-asset-item>
      
      <img id="info-board" src="tyrannosaurus_info.png">
    </a-assets>

    <a-camera look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="5"></a-light>
    <a-light type="directional" intensity="5" position="2 4 2"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-entity id="modelContainer" gesture-handler scale="1 1 1">

        <a-gltf-model
          src="#T-RexModel"
          material="transparent: false; opacity: 1"
          position="0 0 0.1"
          rotation="0 0 0">
        </a-gltf-model>


        <a-image 
          src="#info-board" 
          position="0 0.5 -0.3" 
          rotation="0 0 0" 
          width="1.6" 
          height="0.9">
        </a-image>


      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    AFRAME.registerComponent('gesture-handler', {
      init: function () {
        const el = this.el;
        this.isDragging = false;
        this.previousX = 0;
        this.scale = el.object3D.scale.x;
        this.defaultScale = el.object3D.scale.x;
        this.defaultRotation = 0;
        this.initialDistance = null;
        this.rotationVelocity = 0;
        this.damping = 0.9;
        this.lastTap = 0;

        window.addEventListener('touchstart', (e) => {
          const now = Date.now();
          if (now - this.lastTap < 300) {
            this.scale = this.defaultScale;
            el.object3D.scale.set(this.scale, this.scale, this.scale);
            el.object3D.rotation.y = this.defaultRotation;
            this.rotationVelocity = 0;
          }
          this.lastTap = now;

          if (e.touches.length === 1) {
            this.isDragging = true;
            this.previousX = e.touches[0].clientX;
          }
          if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            this.initialDistance = Math.sqrt(dx * dx + dy * dy);
          }
        });

        window.addEventListener('touchmove', (e) => {
          if (e.touches.length === 1 && this.isDragging) {
            const currentX = e.touches[0].clientX;
            const deltaX = currentX - this.previousX;
            this.rotationVelocity = deltaX * 0.001;
            el.object3D.rotation.y += this.rotationVelocity;
            this.previousX = currentX;
          }

          if (e.touches.length === 2 && this.initialDistance) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const currentDistance = Math.sqrt(dx * dx + dy * dy);
            const scaleFactor = currentDistance / this.initialDistance;
            this.scale *= scaleFactor;
            this.scale = Math.min(Math.max(this.scale, 0.05), 3);
            el.object3D.scale.set(this.scale, this.scale, this.scale);
            this.initialDistance = currentDistance;
          }
        });

        window.addEventListener('touchend', () => {
          this.isDragging = false;
          this.initialDistance = null;
        });
      },

      tick: function () {
        if (!this.isDragging) {
          this.el.object3D.rotation.y += this.rotationVelocity;
          this.rotationVelocity *= this.damping;
          if (Math.abs(this.rotationVelocity) < 0.00001) {
            this.rotationVelocity = 0;
          }
          const limit = THREE.MathUtils.degToRad(360);
          this.el.object3D.rotation.y = Math.max(-limit, Math.min(limit, this.el.object3D.rotation.y));
        }
      }
    });
  </script>
  
  <script>
    document.querySelector('a-gltf-model').addEventListener('model-loaded', function () {
      const mesh = this.getObject3D('mesh');
      if (mesh) {
        mesh.traverse((node) => {
          if (node.isMesh && node.material) {
            node.material.transparent = false;
            node.material.opacity = 1;
            node.material.alphaTest = 0;
            node.material.depthWrite = true;
            node.material.side = THREE.DoubleSide;
            node.material.needsUpdate = true;
          }
        });
      }
    });
  </script>
  
</body>
</html>
